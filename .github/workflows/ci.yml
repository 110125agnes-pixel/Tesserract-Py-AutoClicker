name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install test runner
        run: python -m pip install --upgrade pip pytest
      - name: Syntax check
        run: python -m py_compile $(git ls-files "*.py")
      - name: Run tests
        run: pytest -q
